<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do List</title>
</head>

<body>
    <div class="toolbar">
        <button class="new" command="show-modal" commandfor="inputDialog">+ New</button>
        <dialog id="inputDialog">
            <form>
                <div id="project">
                    <label for="project">PROJECT</label>
                    <input type="text" id="project" name="project" class="projectInput" />
                </div>

                <div id="title">
                    <label for="title">TITLE</label>
                    <input type="text" id="title" name="title" class="titleInput" />
                </div>
                <div id="description">
                    <label for="description">DESCRIPTION</label>
                    <input type="text" id="description" name="description" class="descriptionInput" />
                </div>
                <div id="dueDate">
                    <label for="dueDate">DUE DATE</label>
                    <input type="datetime-local" id="dueDate" name="dueDate" class="dueDateInput" />
                </div>
                <div id="completion">
                    <legend>COMPLETION STATUS</legend>
                    <input type="radio" id="completionStatus1" name="completionStatus" value="completed"
                        class="completionStatusInput" />
                    <label for="completionStatus1">Completed</label>
                    <input type="radio" id="completionStatus2" name="completionStatus" value="onHold"
                        class="completionStatusInput" />
                    <label for="completionStatus2">On Hold</label>
                    <input type="radio" id="completionStatus3" name="completionStatus" value="onGoing"
                        class="completionStatusInput" />
                    <label for="completionStatus3">On-going</label>
                </div>
                <div id="priority">
                    <legend>PRIORITY</legend>
                    <input type="radio" id="priority" name="priority" value="red" class="priorityInput" />
                    <label for="priority1">Red</label>
                    <input type="radio" id="priority2" name="priority" value="yellow" class="priorityInput" />
                    <label for="priority2">Yellow</label>
                    <input type="radio" id="priority3" name="priority" value="green" class="priorityInput" />
                    <label for="priority3">Green</label>
                </div>

            </form>
            <button class="inputDialogSubmitBtn" commandfor="inputDialog" command="close">SUBMIT</button>
        </dialog>

    </div>
    <div class="content">

    </div>
</body>

</html>
